<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Psy | Internal Search Engine</title>
    <link rel="icon" type="image/png" href="psy_logo tiny.png">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --text-color:  #403833;
            --base-bg:     #d1b0a9;
            --surface:     rgba(243, 226, 220, 0.55);
            --text-muted:  rgba(64, 56, 51, 0.65);
            --icon:        rgba(43, 38, 35, 0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--base-bg);
            font-family: 'Courier Prime', monospace;
            color: var(--text-color);
        }

        .container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
        }

        #foliationCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .grain-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.12;
            mix-blend-mode: overlay;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
            background-size: 200px 200px;
            z-index: 5;
        }

        .hero {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 0 8%;
            user-select: none;
        }

        .hero-top {
            flex: 0 0 50%;
            display: flex;
            align-items: flex-end;
        }

        .hero-bottom {
            flex: 0 0 50%;
            display: flex;
            align-items: flex-start;
        }

        .title {
            font-size: clamp(60px, 10vw, 140px);
            font-weight: 700;
            letter-spacing: -0.05em;
            line-height: 0.9;
            margin: 0;
            transition: font-size 0.5s ease;
        }

        .cursor {
            animation: blink 1s steps(2) infinite;
        }

        .subtitle {
            font-size: clamp(20px, 2.6vw, 32px);
            white-space: nowrap;
            margin-top: 1.8rem;
            color: var(--text-color);
            line-height: 1.2;
            font-weight: 400;
        }

        .conversation {
            position: fixed;
            top: 1.5rem;
            left: calc(100% * 2 / 3 - 1.2rem);
            right: 1.2rem;
            bottom: 5rem;
            z-index: 15;
            overflow-y: auto;
            display: none;
            flex-direction: column;
            justify-content: flex-end;
            padding: 0 0.8rem 0.4rem;
            scrollbar-width: none;
            border-radius: 8px;
            background: linear-gradient(to bottom, transparent 0%, var(--surface) 100%);
        }

        .conversation::-webkit-scrollbar { display: none; }

        .conversation p {
            font-family: 'Courier Prime', monospace;
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-top: 1.2rem;
            white-space: pre-wrap;
        }

        .conversation p.user {
            text-align: right;
            font-weight: 700;
        }

        .conversation p.thinking {
            opacity: 0.35;
            font-style: italic;
        }

        .tw-cursor {
            animation: blink 1s steps(2) infinite;
        }

        @keyframes tw-blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        @keyframes blink {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .ask-bar {
            position: fixed;
            bottom: 1.8rem;
            left: calc(100% * 2 / 3 - 1.2rem);
            right: 1.2rem;
            z-index: 20;
            display: flex;
            align-items: center;
            background: var(--surface);
            border-radius: 999px;
            padding: 5px 16px 5px 22px;
            gap: 0.6rem;
        }

        .ask-bar input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            font-family: 'Courier Prime', monospace;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-muted);
            caret-color: var(--text-color);
        }

        #fakePlaceholder {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            color: var(--icon);
            font-family: 'Courier Prime', monospace;
            font-size: 15px;
            font-weight: 700;
            pointer-events: none;
            user-select: none;
        }

        .ask-bar input:disabled {
            opacity: 0.5;
        }

        .ask-bar .enter-icon {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--icon);
            font-size: 1.4rem;
            pointer-events: none;
        }

        @media (max-aspect-ratio: 1/1) {
            .hero {
                padding: 0 5%;
                justify-content: flex-start;
            }
            .hero-spacer {
                flex: 0 0 auto;
                height: 42vh;
                transition: height 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .hero.compressed .hero-spacer {
                height: 2vh;
            }
            .hero.compressed .subtitle {
                margin-top: 6px;
            }
            .hero-top {
                flex: 0 0 auto;
                align-items: flex-start;
            }
            .hero-bottom {
                flex: 0 0 auto;
            }
            .subtitle {
                white-space: normal;
                max-width: 90vw;
            }
            .ask-bar {
                left: 16px;
                right: 16px;
                bottom: 16px;
                box-sizing: border-box;
            }
            .ask-bar input, #fakePlaceholder {
                font-size: 13px;
            }
            .conversation {
                top: 160px;
                left: 16px;
                right: 16px;
                bottom: 55px;
                box-sizing: border-box;
            }
            .conversation p {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<div class="conversation" id="conversation"></div>

    <div class="ask-bar">
        <form autocomplete="off" style="flex:1;display:flex;position:relative;margin:0;" onsubmit="return false;">
            <input type="text" id="askInput" autocomplete="new-password" autocorrect="off" autocapitalize="off" spellcheck="false" />
            <span id="fakePlaceholder">What's Psy_?</span>
        </form>
        <span class="enter-icon">↵</span>
    </div>

    <div class="container">
        <canvas id="foliationCanvas"></canvas>
        <div class="grain-overlay"></div>

        <main class="hero" id="hero">
            <div class="hero-spacer"></div>
            <div class="hero-top">
                <h1 class="title">Psy<span class="cursor">_</span></h1>
            </div>
            <div class="hero-bottom">
                <p class="subtitle">internal search engine for human coherence</p>
            </div>
        </main>
    </div>

    <script>
        // ── Config ──────────────────────────────────────────────
        const API_URL = 'https://api.whatspsy.com/chat';

        // ── Canvas / animation ───────────────────────────────────
        const canvas = document.getElementById('foliationCanvas');
        const ctx = canvas.getContext('2d');
        let time = Math.random() * 1000;

        let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let smoothMouse = { x: mouse.x, y: mouse.y };
        let haloMouse = { x: mouse.x, y: mouse.y };
        let prevMouse = { x: mouse.x, y: mouse.y };
        let mouseStrength = 0;

        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

        const LINE_COUNT = 50;
        const BASE_SPACING = 17;

        const spreadField = (t, x) => {
            const s = Math.sin(t * Math.PI * 2.8 + x * Math.PI * 2.1 + time * 0.22)
                    * Math.cos(x * Math.PI * 1.5 - t * Math.PI * 1.3 - time * 0.17);
            return Math.max(0.25, 1.0 + 0.75 * s);
        };

        const containerEl = document.querySelector('.container');
        let _canvasW = 0;
        let _lockedH = window.innerHeight;
        containerEl.style.height = _lockedH + 'px';

        function resize() {
            if (window.innerWidth === _canvasW) return; // height-only change = keyboard, ignore
            _canvasW = window.innerWidth;
            _lockedH = window.innerHeight;
            containerEl.style.height = _lockedH + 'px';
            const dpr = window.devicePixelRatio || 1;
            canvas.width  = window.innerWidth * dpr;
            canvas.height = _lockedH * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        window.addEventListener('resize', resize);
        resize();

        function draw() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            const gradX1 = width  * (0.45 + Math.sin(time * 0.38) * 0.30);
            const gradY1 = height * (0.42 + Math.cos(time * 0.28) * 0.26);
            const gradX2 = width  * (0.55 + Math.cos(time * 0.22) * 0.32);
            const gradY2 = height * (0.58 + Math.sin(time * 0.33) * 0.22);

            const gradRadius = Math.hypot(width, height);
            const gradient1 = ctx.createRadialGradient(gradX1, gradY1, 0, gradX1, gradY1, gradRadius);
            gradient1.addColorStop(0,   '#c9a79f');
            gradient1.addColorStop(0.35,'#b09080');
            gradient1.addColorStop(0.7, '#947060');
            gradient1.addColorStop(1,   '#7a5c50');
            ctx.fillStyle = gradient1;
            ctx.fillRect(0, 0, width, height);

            const gradient2 = ctx.createRadialGradient(gradX2, gradY2, 0, gradX2, gradY2, width * 0.85);
            gradient2.addColorStop(0,   'rgba(210, 175, 140, 0.45)');
            gradient2.addColorStop(0.45,'rgba(190, 158, 148, 0.28)');
            gradient2.addColorStop(1,   'rgba(155, 140, 135, 0.0)');
            ctx.fillStyle = gradient2;
            ctx.fillRect(0, 0, width, height);

            const gradX3 = width  * (0.5 + Math.sin(time * 0.13 + 2.1) * 0.42);
            const gradY3 = height * (0.5 + Math.cos(time * 0.09 + 0.7) * 0.38);
            const gradient3 = ctx.createRadialGradient(gradX3, gradY3, 0, gradX3, gradY3, Math.hypot(width, height) * 0.65);
            gradient3.addColorStop(0,   'rgba(55, 35, 70, 0.28)');
            gradient3.addColorStop(0.4, 'rgba(60, 38, 72, 0.14)');
            gradient3.addColorStop(1,   'rgba(65, 40, 75, 0.0)');
            ctx.fillStyle = gradient3;
            ctx.fillRect(0, 0, width, height);

            haloMouse.x += (mouse.x - haloMouse.x) * 0.06;
            haloMouse.y += (mouse.y - haloMouse.y) * 0.06;
            ctx.globalCompositeOperation = 'screen';

            const bloomGrad = ctx.createRadialGradient(haloMouse.x, haloMouse.y, 0, haloMouse.x, haloMouse.y, width * 0.55);
            bloomGrad.addColorStop(0,   'rgba(255, 245, 235, 0.18)');
            bloomGrad.addColorStop(0.5, 'rgba(255, 240, 225, 0.06)');
            bloomGrad.addColorStop(1,   'rgba(255, 235, 215, 0.0)');
            ctx.fillStyle = bloomGrad;
            ctx.fillRect(0, 0, width, height);

            const midGrad = ctx.createRadialGradient(haloMouse.x, haloMouse.y, 0, haloMouse.x, haloMouse.y, width * 0.18);
            midGrad.addColorStop(0,   'rgba(255, 210, 140, 0.28)');
            midGrad.addColorStop(0.5, 'rgba(255, 200, 120, 0.10)');
            midGrad.addColorStop(1,   'rgba(255, 190, 100, 0.0)');
            ctx.fillStyle = midGrad;
            ctx.fillRect(0, 0, width, height);

            const coreGrad = ctx.createRadialGradient(haloMouse.x, haloMouse.y, 0, haloMouse.x, haloMouse.y, width * 0.04);
            coreGrad.addColorStop(0,   'rgba(255, 252, 245, 0.50)');
            coreGrad.addColorStop(0.4, 'rgba(255, 248, 235, 0.20)');
            coreGrad.addColorStop(1,   'rgba(255, 245, 220, 0.0)');
            ctx.fillStyle = coreGrad;
            ctx.fillRect(0, 0, width, height);

            ctx.globalCompositeOperation = 'source-over';

            const isMobile = width < 640;
            const resolution = 140;
            const centerY = height * 0.5;
            const effectiveSpacing = isMobile ? (height * 0.60) / LINE_COUNT : BASE_SPACING;

            smoothMouse.x += (mouse.x - smoothMouse.x) * 0.012;
            smoothMouse.y += (mouse.y - smoothMouse.y) * 0.012;

            const mouseDist = Math.hypot(mouse.x - prevMouse.x, mouse.y - prevMouse.y);
            const strengthTarget = mouseDist > 2 ? 0 : 1;
            mouseStrength += (strengthTarget - mouseStrength) * 0.0036;
            prevMouse.x = mouse.x;
            prevMouse.y = mouse.y;

            const mouseRadius = width * 0.32;
            const offsets2d = Array.from({ length: LINE_COUNT }, () => new Float32Array(resolution + 1));
            for (let xStep = 0; xStep <= resolution; xStep++) {
                const xRatio = xStep / resolution;
                const spacings = Array.from({ length: LINE_COUNT - 1 }, (_, i) => {
                    const t = (i + 0.5) / LINE_COUNT;
                    const approxY = centerY + (t - 0.5) * LINE_COUNT * effectiveSpacing;
                    const dx = (xRatio - smoothMouse.x / width) * width;
                    const dy = approxY - smoothMouse.y;
                    const mouseInfluence = mouseStrength * Math.exp(-(dx * dx + dy * dy) / (mouseRadius * mouseRadius));
                    return effectiveSpacing * spreadField(t, xRatio) * Math.max(0.12, 1 - 0.88 * mouseInfluence);
                });
                const total = spacings.reduce((a, b) => a + b, 0);
                let cum = -total / 2;
                offsets2d[0][xStep] = cum;
                for (let i = 1; i < LINE_COUNT; i++) {
                    cum += spacings[i - 1];
                    offsets2d[i][xStep] = cum;
                }
            }

            for (let i = 0; i < LINE_COUNT; i++) {
                ctx.strokeStyle = `rgba(255, 255, 255, 0.22)`;
                ctx.lineWidth = 1.0;
                ctx.beginPath();
                for (let xStep = 0; xStep <= resolution; xStep++) {
                    const xRatio = xStep / resolution;
                    const px = xRatio * width;
                    const spine = centerY
                        + Math.sin(xRatio * Math.PI * 0.9 + time * 0.28) * (height * (isMobile ? 0.18 : 0.26))
                        + Math.cos(xRatio * Math.PI * 0.6 - time * 0.18) * (height * (isMobile ? 0.08 : 0.14))
                        + (isMobile ? 0 : Math.sin(xRatio * Math.PI * 1.7 + time * 0.22) * (height * 0.07))
                        + (isMobile ? 0 : Math.cos(xRatio * Math.PI * 2.3 - time * 0.30) * (height * 0.04));
                    const py = spine + offsets2d[i][xStep];
                    xStep === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                }
                ctx.stroke();
            }

            time += 0.005;
            requestAnimationFrame(draw);
        }
        draw();

        // ── Audio ────────────────────────────────────────────────
        let audioCtx = null;

        function createReverb(ctx) {
            const convolver = ctx.createConvolver();
            const length = ctx.sampleRate * 4;
            const buffer = ctx.createBuffer(2, length, ctx.sampleRate);
            for (let c = 0; c < 2; c++) {
                const data = buffer.getChannelData(c);
                for (let i = 0; i < length; i++)
                    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 1.8);
            }
            convolver.buffer = buffer;
            return convolver;
        }

        const SCALE = [146.83, 220.00, 233.08, 261.63, 293.66, 329.63, 349.23, 392.00, 440.00];

        function playNote(ctx, dest, freq, time) {
            const env = ctx.createGain();
            env.connect(dest);
            const vel = 0.18 + Math.random() * 0.18;
            env.gain.setValueAtTime(0, time);
            env.gain.linearRampToValueAtTime(vel, time + 0.012);
            env.gain.exponentialRampToValueAtTime(0.0001, time + 5.0);
            [[1, 1.0], [2, 0.28], [3.02, 0.14], [4.1, 0.07]].forEach(([ratio, amp]) => {
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = freq * ratio;
                const g = ctx.createGain();
                g.gain.value = amp;
                osc.connect(g);
                g.connect(env);
                osc.start(time);
                osc.stop(time + 5.5);
            });
            const bufSize = ctx.sampleRate * 0.04;
            const noiseBuf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
            const nd = noiseBuf.getChannelData(0);
            for (let i = 0; i < bufSize; i++) nd[i] = (Math.random() * 2 - 1);
            const noise = ctx.createBufferSource();
            noise.buffer = noiseBuf;
            const noiseEnv = ctx.createGain();
            noiseEnv.gain.setValueAtTime(0.06, time);
            noiseEnv.gain.exponentialRampToValueAtTime(0.0001, time + 0.04);
            noise.connect(noiseEnv);
            noiseEnv.connect(env);
            noise.start(time);
        }

        function scheduleNext(ctx, dest) {
            const freq = SCALE[Math.floor(Math.random() * SCALE.length)];
            playNote(ctx, dest, freq, ctx.currentTime);
            setTimeout(() => scheduleNext(ctx, dest), 2200 + Math.random() * 4800);
        }

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const reverb = createReverb(audioCtx);
            const master = audioCtx.createGain();
            master.gain.value = 0.55;
            reverb.connect(master);
            master.connect(audioCtx.destination);
            scheduleNext(audioCtx, reverb);
        }

        document.addEventListener('click',      initAudio, { once: true });
        document.addEventListener('touchstart', initAudio, { once: true });

        // ── Conversation ─────────────────────────────────────────
        const askInput = document.getElementById('askInput');
        const convoEl  = document.getElementById('conversation');
        const heroEl   = document.getElementById('hero');

        let sessionId = '';
        let streaming  = false;

        const fakePlaceholder = document.getElementById('fakePlaceholder');
        askInput.addEventListener('focus', () => { fakePlaceholder.style.display = 'none'; });
        askInput.addEventListener('blur',  () => { if (!askInput.value) fakePlaceholder.style.display = ''; });

        // ── Typewriter ───────────────────────────────────────────
        let twQueue  = [];
        let twEl     = null;
        let twCursor = null;
        let twActive = false;

        function twEnqueue(text) {
            for (const ch of text) twQueue.push(ch);
        }

        function twDelay(ch) {
            let d = 22 + Math.random() * 34;
            if ('.!?'.includes(ch))       d += 80 + Math.random() * 90;
            else if (',;:'.includes(ch))  d += 35 + Math.random() * 40;
            else if (ch === ' ' && Math.random() < 0.07) d += 25 + Math.random() * 30;
            return d;
        }

        function twTick() {
            if (!twActive) return;
            if (twQueue.length === 0) {
                if (!streaming) { twStop(); return; }
                setTimeout(twTick, 20);
                return;
            }
            const ch = twQueue.shift();
            twEl.textContent += ch;
            convoEl.scrollTop = convoEl.scrollHeight;
            setTimeout(twTick, twDelay(ch));
        }

        function twStart(textEl, container) {
            twEl = textEl;
            twActive = true;
            twCursor = document.createElement('span');
            twCursor.className = 'tw-cursor';
            twCursor.textContent = '_';
            container.appendChild(twCursor);
            twTick();
        }

        function twStop() {
            twActive = false;
            if (twEl && twQueue.length) {
                twEl.textContent += twQueue.join('');
                twQueue = [];
                convoEl.scrollTop = convoEl.scrollHeight;
            }
            twCursor = null;
            twEl = null;
        }

        function addMessage(text, role) {
            const p = document.createElement('p');
            p.textContent = text;
            if (role === 'user') p.classList.add('user');
            convoEl.appendChild(p);
            convoEl.scrollTop = convoEl.scrollHeight;
            return p;
        }

        function updateConversationTop() {
            convoEl.style.maskImage = 'linear-gradient(to bottom, transparent 0px, black 80px)';
            convoEl.style.webkitMaskImage = 'linear-gradient(to bottom, transparent 0px, black 80px)';
        }

        function updateConversationBottom() {
            if (!window.visualViewport || window.innerWidth > window.innerHeight) {
                convoEl.style.bottom = '';
                return;
            }
            const obscured = window.innerHeight - window.visualViewport.height;
            convoEl.style.bottom = (obscured + 55) + 'px';
        }

        window.addEventListener('resize', updateConversationTop);
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', updateConversationBottom);
        }
        requestAnimationFrame(updateConversationBottom);

        // ── Subtitle fit ─────────────────────────────────────────
        const subtitleEl = document.querySelector('.subtitle');
        function fitSubtitle() {
            if (window.innerWidth <= window.innerHeight) {
                subtitleEl.style.fontSize = '';
                return;
            }
            subtitleEl.style.fontSize = '';
            const gap = 32; // 2rem margin between subtitle and ask-bar
            const barLeft = window.innerWidth * (2 / 3) - 1.2 * 16;
            const available = barLeft - subtitleEl.getBoundingClientRect().left - gap;
            let size = parseFloat(window.getComputedStyle(subtitleEl).fontSize);
            subtitleEl.style.fontSize = size + 'px';
            while (subtitleEl.scrollWidth > available && size > 12) {
                size -= 0.5;
                subtitleEl.style.fontSize = size + 'px';
            }
        }
        window.addEventListener('resize', fitSubtitle);
        document.fonts.ready.then(fitSubtitle);

        function expandUI() {
            if (!heroEl.classList.contains('compressed')) {
                heroEl.classList.add('compressed');
                convoEl.style.display = 'flex';
                const start = performance.now();
                const duration = 720;
                function track(now) {
                    updateConversationTop();
                    if (now - start < duration) requestAnimationFrame(track);
                }
                requestAnimationFrame(track);
            } else {
                updateConversationTop();
            }
        }

        async function streamResponse(userText) {
            streaming = true;
            askInput.disabled = true;

            const replyEl = document.createElement('p');
            replyEl.classList.add('thinking');
            replyEl.textContent = '...';
            convoEl.appendChild(replyEl);
            convoEl.scrollTop = convoEl.scrollHeight;
            let textSpan = null;

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userText, session_id: sessionId }),
                });

                if (!res.ok) throw new Error(`Server error ${res.status}`);

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let firstToken = true;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });

                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6);

                        if (data === '[DONE]') break;

                        // First event carries session_id JSON
                        if (data.startsWith('{')) {
                            try {
                                const json = JSON.parse(data);
                                if (json.session_id) {
                                    sessionId = json.session_id;
                                }
                            } catch {}
                            continue;
                        }

                        if (firstToken) {
                            replyEl.classList.remove('thinking');
                            replyEl.textContent = '';
                            textSpan = document.createElement('span');
                            replyEl.appendChild(textSpan);
                            twStart(textSpan, replyEl);
                            firstToken = false;
                        }

                        twEnqueue(data.replace(/\\n/g, '\n'));
                    }
                }
            } catch (err) {
                twStop();
                replyEl.classList.remove('thinking');
                replyEl.textContent = '[connection error — is the Identity server running?]';
                replyEl.style.opacity = '0.4';
                console.error(err);
            } finally {
                streaming = false;
                askInput.disabled = false;
                askInput.focus();
            }
        }

        async function streamGreeting() {
            streaming = true;
            const replyEl = document.createElement('p');
            replyEl.classList.add('thinking');
            replyEl.textContent = '...';
            convoEl.appendChild(replyEl);
            convoEl.scrollTop = convoEl.scrollHeight;
            let textSpan = null;

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: '[meta] A visitor just arrived at the landing page. An an identity narrator of Psy_, introduce yourself briefly and invite them to ask anything.',
                        session_id: sessionId
                    }),
                });

                if (!res.ok) throw new Error(`Server error ${res.status}`);

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let firstToken = true;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6);
                        if (data === '[DONE]') break;
                        if (data.startsWith('{')) {
                            try { const j = JSON.parse(data); if (j.session_id) sessionId = j.session_id; } catch {}
                            continue;
                        }
                        if (firstToken) {
                            replyEl.classList.remove('thinking');
                            replyEl.textContent = '';
                            textSpan = document.createElement('span');
                            replyEl.appendChild(textSpan);
                            twStart(textSpan, replyEl);
                            firstToken = false;
                        }
                        twEnqueue(data.replace(/\\n/g, '\n'));
                    }
                }
            } catch (err) {
                twStop();
                replyEl.classList.remove('thinking');
                replyEl.textContent = '[connection error]';
                replyEl.style.opacity = '0.4';
            } finally {
                streaming = false;
                askInput.disabled = false;
            }
        }

        let greetingShown = false;

        askInput.addEventListener('focus', () => {
            if (greetingShown || streaming) return;
            greetingShown = true;
            expandUI();
            streamGreeting();
        });

        askInput.addEventListener('keydown', e => {
            if (e.key !== 'Enter') return;
            const text = askInput.value.trim();
            if (!text || streaming) return;
            askInput.value = '';
            fakePlaceholder.style.display = 'none';

            expandUI();
            addMessage(text, 'user');
            streamResponse(text);
        });
    </script>
</body>
</html>
