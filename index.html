<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psy | Internal Search Engine</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --text-color: #5e3d35;
            --subtitle-color: #7a5049;
            --base-bg: #c9ab9e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--base-bg);
            font-family: 'Courier Prime', monospace;
            color: var(--text-color);
            cursor: none;
        }

        #custom-cursor {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--text-color);
            transform: translate(0, -0.15em);
            animation: blink 1s steps(2) infinite;
            user-select: none;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        /* Canvas should fill the screen */
        #foliationCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Texture overlay for the "Classic" paper feel */
        .grain-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.12;
            mix-blend-mode: overlay;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
            background-size: 200px 200px;
            z-index: 5;
        }

        /* Content Layer */
        .hero {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 0 8%;
            user-select: none;
        }

        .title {
            font-size: clamp(60px, 10vw, 140px);
            font-weight: 700;
            letter-spacing: -0.05em;
            line-height: 0.9;
            margin-top: auto;
            margin-bottom: 0;
        }

        .cursor {
            animation: blink 1s steps(2) infinite;
        }

        .subtitle {
            font-size: clamp(18px, 2.2vw, 28px);
            white-space: nowrap;
            margin-top: 1rem;
            margin-bottom: auto;
            color: var(--subtitle-color);
            line-height: 1.2;
            font-weight: 400;
        }

        @keyframes blink {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @media (max-width: 640px) {
            .hero {
                padding: 0 5%;
            }
            .subtitle {
                white-space: normal;
                max-width: 90vw;
            }
        }
    </style>
</head>
<body>

    <div id="custom-cursor">_</div>
    <div class="container">
        <canvas id="foliationCanvas"></canvas>
        <div class="grain-overlay"></div>

        <main class="hero">
            <h1 class="title">Psy<span class="cursor">_</span></h1>
            <p class="subtitle">internal search engine for human coherence</p>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('foliationCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrameId;
        let time = 0;

        let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let smoothMouse = { x: mouse.x, y: mouse.y };
        let prevMouse = { x: mouse.x, y: mouse.y };
        let mouseStrength = 0;

        const cursorEl = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            cursorEl.style.left = e.clientX + 'px';
            cursorEl.style.top  = e.clientY + 'px';
        });

        const LINE_COUNT = 50;
        const BASE_SPACING = 17;

        // Smooth 2D spread field — t: position across band (0–1), x: position along curve (0–1)
        // Higher value = adjacent lines diverge (spread apart) at that location
        const spreadField = (t, x) => {
            const s = Math.sin(t * Math.PI * 2.8 + x * Math.PI * 2.1 + time * 0.22)
                    * Math.cos(x * Math.PI * 1.5 - t * Math.PI * 1.3 - time * 0.17);
            return Math.max(0.25, 1.0 + 0.75 * s);
        };


        function resize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        window.addEventListener('resize', resize);
        resize();

        function draw() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            // 1. DYNAMIC GRADIENT BACKGROUND — two offset centers moving independently
            const gradX1 = width  * (0.45 + Math.sin(time * 0.38) * 0.30);
            const gradY1 = height * (0.42 + Math.cos(time * 0.28) * 0.26);
            const gradX2 = width  * (0.55 + Math.cos(time * 0.22) * 0.32);
            const gradY2 = height * (0.58 + Math.sin(time * 0.33) * 0.22);

            // Base layer: warm sand → muted clay → cool greige
            const gradient1 = ctx.createRadialGradient(gradX1, gradY1, 0, gradX1, gradY1, width * 1.15);
            gradient1.addColorStop(0,   '#ead0bc');
            gradient1.addColorStop(0.35,'#d1b0a4');
            gradient1.addColorStop(0.7, '#c0a89a');
            gradient1.addColorStop(1,   '#ae9488');
            ctx.fillStyle = gradient1;
            ctx.fillRect(0, 0, width, height);

            // Second layer: drifting ochre/amber accent, blended on top
            const gradient2 = ctx.createRadialGradient(gradX2, gradY2, 0, gradX2, gradY2, width * 0.85);
            gradient2.addColorStop(0,   'rgba(210, 175, 140, 0.45)'); // warm ochre
            gradient2.addColorStop(0.45,'rgba(190, 158, 148, 0.28)'); // dusty rose
            gradient2.addColorStop(1,   'rgba(155, 140, 135, 0.0)');  // fade out
            ctx.fillStyle = gradient2;
            ctx.fillRect(0, 0, width, height);

            // 3. CURSOR LIGHT — warm yellow glow following the mouse
            const cursorGrad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, width * 0.55);
            cursorGrad.addColorStop(0,    'rgba(255, 255, 252, 0.38)');
            cursorGrad.addColorStop(0.06, 'rgba(255, 248, 220, 0.30)');
            cursorGrad.addColorStop(0.45, 'rgba(250, 225, 160, 0.14)');
            cursorGrad.addColorStop(1,    'rgba(245, 215, 140, 0.0)');
            ctx.fillStyle = cursorGrad;
            ctx.fillRect(0, 0, width, height);

            // FOLIATION WAVE LINES
            const isMobile = width < 640;
            const resolution = 140;
            const centerY = height * 0.5;
            // On mobile: fit band to ~60% of viewport height so lines don't squish
            const effectiveSpacing = isMobile ? (height * 0.60) / LINE_COUNT : BASE_SPACING;

            // Smooth mouse position — density center never jumps
            smoothMouse.x += (mouse.x - smoothMouse.x) * 0.012;
            smoothMouse.y += (mouse.y - smoothMouse.y) * 0.012;

            // mouseStrength — slow in both directions, no snapping
            const mouseDist = Math.hypot(mouse.x - prevMouse.x, mouse.y - prevMouse.y);
            const strengthTarget = mouseDist > 2 ? 0 : 1;
            mouseStrength += (strengthTarget - mouseStrength) * 0.0036;
            prevMouse.x = mouse.x;
            prevMouse.y = mouse.y;

            // Build per-frame 2D offset table: offsets[line][xStep]
            const mouseRadius = width * 0.32;
            const offsets2d = Array.from({ length: LINE_COUNT }, () => new Float32Array(resolution + 1));
            for (let xStep = 0; xStep <= resolution; xStep++) {
                const xRatio = xStep / resolution;
                const spacings = Array.from({ length: LINE_COUNT - 1 }, (_, i) => {
                    const t = (i + 0.5) / LINE_COUNT;
                    const approxY = centerY + (t - 0.5) * LINE_COUNT * effectiveSpacing;
                    const dx = (xRatio - smoothMouse.x / width) * width;
                    const dy = approxY - smoothMouse.y;
                    const mouseInfluence = mouseStrength * Math.exp(-(dx * dx + dy * dy) / (mouseRadius * mouseRadius));
                    return effectiveSpacing * spreadField(t, xRatio) * Math.max(0.12, 1 - 0.88 * mouseInfluence);
                });
                const total = spacings.reduce((a, b) => a + b, 0);
                let cum = -total / 2;
                offsets2d[0][xStep] = cum;
                for (let i = 1; i < LINE_COUNT; i++) {
                    cum += spacings[i - 1];
                    offsets2d[i][xStep] = cum;
                }
            }

            for (let i = 0; i < LINE_COUNT; i++) {
                ctx.strokeStyle = `rgba(255, 255, 255, 0.22)`;
                ctx.lineWidth = 1.0;
                ctx.beginPath();

                for (let xStep = 0; xStep <= resolution; xStep++) {
                    const xRatio = xStep / resolution;
                    const px = xRatio * width;

                    // Simpler spine on mobile — fewer harmonics, smaller amplitude
                    const spine = centerY
                        + Math.sin(xRatio * Math.PI * 0.9 + time * 0.28) * (height * (isMobile ? 0.18 : 0.26))
                        + Math.cos(xRatio * Math.PI * 0.6 - time * 0.18) * (height * (isMobile ? 0.08 : 0.14))
                        + (isMobile ? 0 : Math.sin(xRatio * Math.PI * 1.7 + time * 0.22) * (height * 0.07))
                        + (isMobile ? 0 : Math.cos(xRatio * Math.PI * 2.3 - time * 0.30) * (height * 0.04));

                    const py = spine + offsets2d[i][xStep];

                    xStep === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                }
                ctx.stroke();
            }

            time += 0.005;
            animationFrameId = requestAnimationFrame(draw);
        }

        // Start animation
        draw();
    </script>
</body>
</html>
